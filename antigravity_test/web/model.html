<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Canvas</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            /* Allows Flutter's gradient to show through */
            overflow: hidden;
            /* Prevent scrolling inside the iframe */
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent;
            outline: none;
        }
    </style>
    <!-- Official Google model-viewer CDN -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>
    <!-- 
      The path to assets in Flutter Web is usually relative to the root URL.
      When served, 'assets/isometric_rec_room.glb' maps to the project's assets folder.
      We use environment-image="neutral" to force lighting in case the GLB lacks baked lights.
    -->
    <model-viewer src="assets/assets/isometric_rec_room.glb" alt="A 3D isometric room model" camera-controls auto-rotate
        auto-rotate-delay="0" interaction-prompt="none" environment-image="neutral" exposure="1.0"
        shadow-intensity="1.0">
    </model-viewer>
</body>

</html>
